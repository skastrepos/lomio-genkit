services:
  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      LOMIO_AI_PROVIDER: demo
      DATABASE_URL: postgresql://lomio:lomio@postgres:5432/lomio
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lomio
      POSTGRES_PASSWORD: lomio
      POSTGRES_DB: lomio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  pnpm-store:
  postgres-data:
  redis-data:
